name: live-tfl

# Small live-vs-static validation: fair transit meeting point on live TfL
# Journey Planner times vs the bundled r5py GTFS snapshot, same instances.
# Needs a free TfL app key stored as the repo secret TFL_APP_KEY (works without
# one at the lower unregistered rate limit, but slower).

on:
  workflow_dispatch:
    inputs:
      n_instances:
        description: London transit instances
        default: "15"
        type: string
      live_cands:
        description: Candidates per instance (bounds TfL calls)
        default: "30"
        type: string
      commit_results:
        description: Commit result CSV back to main
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  live-tfl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: pip install -r requirements.txt
      - name: Fetch London network + GTFS
        run: python scripts/fetch_data.py --only london
      - name: Live TfL vs static snapshot
        env:
          N_INSTANCES: ${{ inputs.n_instances }}
          LIVE_CANDS: ${{ inputs.live_cands }}
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
          JAVA_TOOL_OPTIONS: -Xmx8g
        run: |
          rm -f outputs/live_tfl.csv
          python scripts/run_live_tfl.py
      - uses: actions/upload-artifact@v4
        with:
          name: live_tfl
          path: outputs/live_tfl.csv
      - name: Commit and push
        if: ${{ inputs.commit_results }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/live_tfl.csv
          if git diff --cached --quiet; then
            echo "no result changes to commit"
          else
            git commit -m "Add live TfL vs static transit validation results (London)"
            git push
          fi
